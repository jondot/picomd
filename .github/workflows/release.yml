name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 is cross-compiled on the arm64 runner: macOS system frameworks
          # are universal, so arm64 -> x86_64 links cleanly, and it avoids the
          # scarce/long-queueing macos-13 Intel runners on private repos.
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest      # native Apple-silicon runner
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # wry needs webkit2gtk + gtk dev libraries on Linux.
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../picomd-${{ matrix.target }}.tar.gz picomd
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picomd-${{ matrix.target }}
          path: picomd-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              "$f"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.bundle
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: [build, release]
    # Opt-in: set repository variable PUBLISH_NPM=true (and the NPM_TOKEN secret)
    # to enable npm publishing. Skipped by default so releases work without npm.
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare npm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf artifacts/picomd-aarch64-apple-darwin/picomd-aarch64-apple-darwin.tar.gz       -C npm/picomd-darwin-arm64/ 2>/dev/null || true
          tar xzf artifacts/picomd-x86_64-apple-darwin/picomd-x86_64-apple-darwin.tar.gz         -C npm/picomd-darwin-x64/  2>/dev/null || true
          tar xzf artifacts/picomd-x86_64-unknown-linux-gnu/picomd-x86_64-unknown-linux-gnu.tar.gz -C npm/picomd-linux-x64/  2>/dev/null || true
          for pkg in npm/picomd npm/picomd-darwin-arm64 npm/picomd-darwin-x64 npm/picomd-linux-x64; do
            npm --prefix "$pkg" version "$VERSION" --no-git-tag-version --allow-same-version
          done
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('npm/picomd/package.json'));
            const v = p.version;
            Object.keys(p.optionalDependencies).forEach(k => p.optionalDependencies[k] = v);
            fs.writeFileSync('npm/picomd/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish platform packages
        run: |
          for pkg in npm/picomd-darwin-arm64 npm/picomd-darwin-x64 npm/picomd-linux-x64; do
            [ -d "$pkg" ] && cd "$pkg" && npm publish --access public || true && cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: cd npm/picomd && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    # Opt-in: set repository variable PUBLISH_CRATES=true (and the
    # CARGO_REGISTRY_TOKEN secret). Skipped by default. `cargo publish` only
    # succeeds for a version not already on crates.io, so it runs once per tag.
    if: ${{ vars.PUBLISH_CRATES == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `cargo publish` verifies by building the bin, which pulls in wry/tao.
      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
